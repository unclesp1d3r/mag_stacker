version: 2
updates:
  # This project uses Bun. Dependabot's "bun" ecosystem maintains bun.lock;
  # the "npm" ecosystem does not, which leaves the lockfile stale and breaks
  # `bun install --frozen-lockfile` in CI. Note: the bun ecosystem currently
  # supports version updates only (no security updates).
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for Dev Containers
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
