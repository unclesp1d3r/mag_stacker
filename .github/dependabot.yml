version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Maintain dependencies for Dev Containers
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
