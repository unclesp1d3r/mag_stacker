name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # mise provisions the pinned dev tools (bun, etc.) from mise.toml.
      # install + cache keep CI in lockstep with local dev.
      - name: Set up mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Code gates: Biome (lint + format + import order), TypeScript, build.

      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
      - name: Run Biome
        run: biome ci

      - name: Type-check
        run: bun run typecheck

      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest # ships a Docker daemon for Testcontainers
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only job that runs repo code and uploads artifacts — keep the
          # GITHUB_TOKEN out of local git config.
          persist-credentials: false

      # Guard: resolved run credentials/tokens live under e2e/.artifacts/ and are
      # gitignored — fail loudly if any were ever force-added to the repo.
      - name: Guard against committed e2e artifacts
        run: |
          if git ls-files --error-unmatch 'e2e/.artifacts/*' 2>/dev/null; then
            echo "::error::e2e/.artifacts/ must never be committed (it holds generated secrets)."
            exit 1
          fi

      - name: Set up mise tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      # Pull Postgres up front so it's cached for Testcontainers and a pull
      # failure surfaces as a clear step, not a webServer startup timeout. Uses
      # the AWS ECR Public mirror of the Docker Official image (same bytes) so
      # it isn't subject to Docker Hub's unauthenticated per-IP pull limit on
      # shared runner IPs. Must match POSTGRES_IMAGE in e2e/start-test-server.ts.
      - name: Pre-pull Postgres image
        run: docker pull public.ecr.aws/docker/library/postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e

      # Build ahead of the suite so the launcher finds .next and skips the cold
      # build inside the webServer startup timeout.
      - name: Build
        run: bun run build

      - name: Run E2E suite
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
