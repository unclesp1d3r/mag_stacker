name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # mise provisions the pinned dev tools (bun, etc.) from mise.toml.
      # install + cache keep CI in lockstep with local dev.
      - name: Set up mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Code gates: Biome (lint + format + import order), TypeScript, build.
      - name: Lint (Biome)
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Build
        run: bun run build
