name: Docker Release

# Builds the production image from the repo Dockerfile and publishes it to the
# GitHub Container Registry (GHCR). No extra secrets needed — auth uses the
# built-in GITHUB_TOKEN.
#
#   - Push a semver tag (e.g. `v1.2.3`) — or publish a GitHub Release, which
#     creates the tag — to cut a release: pushes `1.2.3`, `1.2`, `1`, `latest`.
#     After the image publishes, the `github-release` job creates the GitHub
#     Release with generated notes if one doesn't already exist for the tag.
#   - Pushes to `main` publish a rolling `edge` image.
#   - `workflow_dispatch` lets you trigger a build manually.
#
# Image: ghcr.io/<owner>/<repo>  (e.g. ghcr.io/unclesp1d3r/mag_stacker)

"on":
  push:
    tags: ["v*.*.*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push images + SBOM/provenance to GHCR

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # QEMU enables the linux/arm64 build below (homelab hardware: Pi, Apple
      # Silicon mini-servers). Emulated arm64 builds are slower — drop arm64 from
      # `platforms` if build time matters more than reach.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=main
            type=sha,format=short
          # `latest` only on a semver tag, never on main/sha.
          flavor: latest=auto

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true # SLSA build provenance attestation
          sbom: true # SBOM attestation (pairs with the repo's syft usage)

  # On semver tags only: publish a GitHub Release once the image is out, so a
  # CLI-pushed tag (RELEASE.md "Option B") still gets a Release with notes.
  # Idempotent — a Release created via the GitHub UI (Option A) is left alone.
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
