# Self-hosted MagStacker stack: Next.js app + Postgres.
#
# Image source — two supported flows:
#   • Run a published release (no source needed):
#       docker compose pull && docker compose up -d
#     Pulls ghcr.io/unclesp1d3r/mag_stacker:${MAGSTACKER_VERSION:-latest}
#     (set MAGSTACKER_VERSION in .env to pin a version, or use `edge` for main).
#     These tags are published by the Docker Release workflow — `latest` after
#     the first `v*` release tag is pushed, `edge` on each push to main. Until
#     then, build from source with `--build`.
#   • Build from this checkout:
#       docker compose up --build -d
#     Builds the Dockerfile and tags it with the same image name.
#
# Secrets (POSTGRES_PASSWORD, BETTER_AUTH_SECRET, ...) are supplied at runtime
# via a gitignored `.env` file or the host environment — never committed here
# or baked into the image. Copy `.env.example` to `.env` and fill it in.
#
# Required variables — the stack refuses to start (a `${VAR:?...}` guard aborts
# `docker compose` before anything runs) if these are unset or empty:
#   • POSTGRES_PASSWORD   — database password
#   • BETTER_AUTH_SECRET  — auth signing secret (openssl rand -base64 32)
# Optional (sensible defaults): POSTGRES_USER/POSTGRES_DB (magstacker),
#   BETTER_AUTH_URL (http://localhost:3000 — set to your real origin behind a
#   proxy), APP_HOST_PORT/POSTGRES_HOST_PORT, MAGSTACKER_VERSION (latest), and
#   ADMIN_EMAIL/ADMIN_PASSWORD (unset ⇒ the first-admin seed is skipped).
#
# Network exposure on a home network should sit behind a TLS-terminating
# reverse proxy so session cookies and credentials are never sent in cleartext.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magstacker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-magstacker}
    volumes:
      - magstacker-pgdata:/var/lib/postgresql/data
    ports:
      # Host port is configurable; defaults away from 5432 to avoid clashing
      # with a host Postgres. The app reaches the db by service name internally.
      - "${POSTGRES_HOST_PORT:-5544}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magstacker} -d ${POSTGRES_DB:-magstacker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot bootstrap: apply migrations, then seed the first admin. Both steps
  # are idempotent — already-applied migrations are skipped, and the seed no-ops
  # when the admin already exists — so this is safe to re-run on every `up`. The
  # seed is skipped (not failed) when ADMIN_EMAIL/ADMIN_PASSWORD are unset, so an
  # operator who hasn't chosen admin credentials yet still gets a running stack.
  # Admin credentials live only in this short-lived container, never in the
  # long-running app process.
  migrate:
    image: ghcr.io/unclesp1d3r/mag_stacker:${MAGSTACKER_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - |
        set -e
        bun run db:migrate
        if [ -n "$$ADMIN_EMAIL" ] && [ -n "$$ADMIN_PASSWORD" ]; then
          bun run seed:admin
        else
          echo "ADMIN_EMAIL/ADMIN_PASSWORD unset — skipping first-admin seed."
        fi
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-magstacker}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-magstacker}
      # seed:admin imports `@/auth`, which needs the secret at module load.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Optional: when set, the first admin is created on an empty DB.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/unclesp1d3r/mag_stacker:${MAGSTACKER_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-magstacker}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-magstacker}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  magstacker-pgdata:
